<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UT - Vehicle Log Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style> 
    body { background-color: #f4f6f9; } 
    .navbar { background-color: #7b2cbf !important; } 
    .nav-tabs .nav-link.active { font-weight: bold; color: #7b2cbf; border-bottom: 3px solid #7b2cbf; }
    .nav-tabs .nav-link { color: #555; }
    .part-checkbox { cursor: pointer; }
    .voucher-link { text-decoration: none; font-size: 0.8rem; margin-right: 5px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark mb-4 shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold text-white d-flex align-items-center">
        <img src="https://zdifzvpjmmmsfitjsraw.supabase.co/storage/v1/object/public/Logo/UT%20Logo.png" style="height: 35px; margin-right: 10px; border-radius: 4px;">
        <div style="line-height: 1.1;" id="portalTitle">Universal Tractor Co., Ltd.<br><small style="font-size: 0.75rem;">Vehicle Log Portal</small></div>
      </span>
    </div>
  </nav>

  <div class="container" style="max-width: 650px;">
    
    <div class="card p-3 mb-3 shadow-sm border-0" id="selectBoxArea">
      <label class="fw-bold mb-2" style="color: #7b2cbf;">1. Scan or Select Vehicle</label>
      <select id="vehSelect" class="form-select border-primary" onchange="loadProfile()"><option value="">Loading Data...</option></select>
    </div>

    <div id="profileBox" class="card p-3 mb-3 bg-white rounded border-0 shadow-sm" style="display:none;">
      <div class="d-flex align-items-center mb-3 pb-2 border-bottom">
        <img id="profImg" src="" style="width:70px; height:70px; object-fit:cover; border-radius:8px; border: 2px solid #7b2cbf; display:none;">
        <div class="ms-3 flex-grow-1">
           <h4 id="profPlate" class="mb-1 fw-bold" style="color: #7b2cbf;"></h4>
           <div id="profName" class="text-dark fw-bold small mb-1"></div>
           <div id="profType" class="text-muted small"></div>
        </div>
      </div>

      <ul class="nav nav-tabs mb-3" id="portalTabs">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#addLogTab"><i class="bi bi-pencil-square"></i> Add New Log</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#ledgerTab"><i class="bi bi-journal-text"></i> Ledger History</a></li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="addLogTab">
          <div class="mb-3">
            <label class="small fw-bold">Driver Name</label>
            <select id="lDriver" class="form-select" required><option value="">Select Driver...</option></select>
          </div>
          <div class="mb-3">
            <label class="small fw-bold">Activity</label>
            <select id="lActivity" class="form-select" onchange="toggleFields()" required>
              <option value="">Select Activity...</option>
              <option value="Using">Using</option>
              <option value="Refilling Fuel">Refilling Fuel</option>
              <option value="Maintaining">Maintaining</option>
              <option value="Repairing">Repairing</option>
            </select>
          </div>
          
          <div class="row g-2 mb-3">
            <div class="col-6"><label class="small fw-bold">Odometer (KM)</label><input type="number" id="lOdo" class="form-control" required></div>
            <div class="col-6"><label class="small fw-bold">Cost (MMK) <span class="text-muted fw-normal">Optional</span></label><input type="number" id="lCost" class="form-control"></div>
            
            <div class="col-12 mt-2" id="fuelBox" style="display:none;">
               <label class="small fw-bold text-success">Fuel Volume (Liters)</label>
               <input type="number" step="0.01" id="lFuelLiters" class="form-control border-success" placeholder="e.g. 20.5">
            </div>
          </div>

          <div class="mb-3 p-2 border rounded bg-light" id="partsBox" style="display:none;">
            <label class="small fw-bold text-danger mb-2">Select Affected Parts</label>
            <div class="row g-2 small">
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Engine Oil/Filter"> <label>Engine Oil/Filter</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Tires/Wheels"> <label>Tires/Wheels</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Brake System"> <label>Brake System</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Battery/Electrical"> <label>Battery/Electrical</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Suspension"> <label>Suspension</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Air Con (A/C)"> <label>Air Con (A/C)</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Body/Paint"> <label>Body/Paint</label></div></div>
              <div class="col-6"><div class="form-check"><input class="form-check-input part-checkbox" type="checkbox" value="Other"> <label>Other (Specify in remark)</label></div></div>
            </div>
          </div>

          <div class="mb-3" id="voucherBox" style="display:none;">
             <label class="small fw-bold text-primary"><i class="bi bi-receipt"></i> Attach Vouchers/Receipts (Multiple allowed)</label>
             <input type="file" id="lVouchers" class="form-control border-primary" accept="image/*" multiple>
          </div>

          <div class="mb-3">
            <label class="small fw-bold">Remark</label>
            <textarea id="lRemark" class="form-control" rows="2" placeholder="Route details, workshop name, extra info..."></textarea>
          </div>
          <button class="btn w-100 fw-bold shadow-sm text-white" style="background-color: #7b2cbf;" id="btnLog" onclick="submitLog()">Submit Vehicle Log</button>
        </div>

        <div class="tab-pane fade" id="ledgerTab">
           <div class="row g-2 mb-3 bg-light p-2 rounded">
              <div class="col-4">
                 <select id="filterMonth" class="form-select form-select-sm border-secondary" onchange="renderMyLedger()">
                    <option value="">Month</option>
                    <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                    <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                    <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                    <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                 </select>
              </div>
              <div class="col-4">
                 <select id="filterYear" class="form-select form-select-sm border-secondary" onchange="renderMyLedger()">
                    <option value="">Year</option>
                    <option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option>
                 </select>
              </div>
              <div class="col-4">
                 <select id="filterActLog" class="form-select form-select-sm border-secondary" onchange="renderMyLedger()">
                    <option value="">All Activity</option>
                    <option value="Using">Using</option>
                    <option value="Refilling Fuel">Refill</option>
                    <option value="Maintaining">Maintain</option>
                    <option value="Repairing">Repair</option>
                 </select>
              </div>
           </div>

           <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
             <table class="table table-sm table-bordered table-hover align-middle text-center">
               <thead class="table-dark sticky-top">
                 <tr><th>Date/Driver</th><th>Activity / Remark</th><th>Odo/Cost</th></tr>
               </thead>
               <tbody id="myLedgerBody">
                 <tr><td colspan="3" class="text-muted py-3">Loading History...</td></tr>
               </tbody>
             </table>
           </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://zdifzvpjmmmsfitjsraw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Eghy_AeArZhWU86ETOoWqg_FI8xXh9P';
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <script>
    let pData = { vehicles: [], drivers: [] }; 
    let globalLedgerData = [];
    const urlParams = new URLSearchParams(window.location.search);
    const SCANNED_VEH = urlParams.get('plate') || "";
    
    // Lightbox Function for viewing vouchers
    function zoomImg(url) {
      if(!url) return;
      Swal.fire({ imageUrl: url, imageAlt: 'Voucher', width: 'auto', showConfirmButton: false, background: 'transparent', backdrop: `rgba(0,0,0,0.8)` });
    }

    window.onload = async () => {
      try {
        const { data: vData } = await supabase.from('vms_vehicles').select('*');
        const { data: sData } = await supabase.from('vms_settings').select('*').eq('category', 'Driver');

        pData.vehicles = (vData || []).filter(v => v.status === 'Active');
        pData.drivers = (sData || []).map(s => s.subcategory);

        document.getElementById('vehSelect').innerHTML = '<option value="">-- Select Vehicle Plate --</option>' + pData.vehicles.map(v => `<option value="${v.plate}">${v.plate} - ${v.name}</option>`).join('');
        document.getElementById('lDriver').innerHTML = '<option value="">Select Driver...</option>' + pData.drivers.map(d => `<option value="${d}">${d}</option>`).join('');
        
        if(SCANNED_VEH !== "") {
            document.getElementById('vehSelect').value = decodeURIComponent(SCANNED_VEH);
            document.getElementById('selectBoxArea').style.display = 'none';
            loadProfile();
        }
      } catch (err) { Swal.fire("Error", err.message, "error"); }
    };

    function loadProfile() {
      let plate = document.getElementById('vehSelect').value; 
      let pBox = document.getElementById('profileBox'); 
      if(!plate) { pBox.style.display = 'none'; return; }
      
      let veh = pData.vehicles.find(v => v.plate === plate);
      document.getElementById('profPlate').innerText = veh.plate; 
      document.getElementById('profName').innerText = veh.name;
      document.getElementById('profType').innerText = veh.type;
      
      let imgEl = document.getElementById('profImg');
      if(veh.photo_front) { imgEl.src = veh.photo_front; imgEl.style.display = 'block'; } else { imgEl.style.display = 'none'; }
      
      pBox.style.display = 'block'; fetchMyLedger(plate); 
    }

    function toggleFields() {
       let act = document.getElementById('lActivity').value;
       document.getElementById('fuelBox').style.display = act.includes('Refilling') ? 'block' : 'none';
       document.getElementById('partsBox').style.display = (act.includes('Maintain') || act.includes('Repair')) ? 'block' : 'none';
       document.getElementById('voucherBox').style.display = (act !== 'Using' && act !== '') ? 'block' : 'none';
    }

    async function uploadVouchers(files, plate) {
       let urls = [];
       for(let i=0; i<files.length; i++) {
          let file = files[i];
          let safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
          let fName = `voucher_${plate}_${Date.now()}_${i}_${safeName}`;
          const { error } = await supabase.storage.from('vms_photos').upload(fName, file);
          if(!error) {
             const { data } = supabase.storage.from('vms_photos').getPublicUrl(fName);
             urls.push(data.publicUrl);
          }
       }
       return urls.join(','); // Store as comma-separated string
    }

    async function submitLog() {
      let plate = document.getElementById('vehSelect').value; 
      let driver = document.getElementById('lDriver').value;
      let activity = document.getElementById('lActivity').value; 
      let odo = document.getElementById('lOdo').value;
      let cost = document.getElementById('lCost').value;
      let remark = document.getElementById('lRemark').value;
      let liters = activity.includes('Refilling') ? document.getElementById('lFuelLiters').value : 0;
      
      if(!driver || !activity || !odo) return Swal.fire("Incomplete", "Driver, Activity, and Odometer are required.", "warning");
      
      let btn = document.getElementById('btnLog'); btn.disabled = true; btn.innerText = "Submitting...";

      // Get Selected Parts
      let selectedParts = [];
      document.querySelectorAll('.part-checkbox:checked').forEach(cb => selectedParts.push(cb.value));
      let partsStr = selectedParts.join(', ');

      // Handle Voucher Uploads
      let vFiles = document.getElementById('lVouchers').files;
      let vUrlsStr = '';
      if(vFiles.length > 0) {
         btn.innerText = "Uploading Vouchers...";
         try { vUrlsStr = await uploadVouchers(vFiles, plate); } 
         catch(e) { Swal.fire("Upload Error", "Failed to upload vouchers", "error"); }
      }

      let payload = { 
        date_str: new Date().toLocaleString('en-GB').split(',')[0].trim(),
        plate: plate, driver: driver, activity: activity, 
        odometer: Number(odo), cost: Number(cost) || 0, 
        fuel_liters: Number(liters) || 0, remark: remark,
        parts: partsStr, vouchers: vUrlsStr
      };
      
      try {
        btn.innerText = "Saving Data...";
        const { error } = await supabase.from('vms_vehicle_logs').insert([payload]);
        if(error) throw error;
        
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Log saved', showConfirmButton: false, timer: 1500 });
        
        // Reset Form
        ['lActivity','lOdo','lCost','lRemark','lFuelLiters','lVouchers'].forEach(id => document.getElementById(id).value = '');
        document.querySelectorAll('.part-checkbox').forEach(cb => cb.checked = false);
        toggleFields(); fetchMyLedger(plate); 

        // Switch to Ledger Tab automatically
        let triggerEl = document.querySelector('a[href="#ledgerTab"]');
        let tab = new bootstrap.Tab(triggerEl); tab.show();

      } catch (err) { Swal.fire("Error", err.message, "error"); } 
      finally { btn.disabled = false; btn.innerText = "Submit Vehicle Log"; }
    }

    async function fetchMyLedger(plate) {
      document.getElementById('myLedgerBody').innerHTML = '<tr><td colspan="3" class="text-muted py-3">Fetching Logs...</td></tr>';
      try {
        const { data } = await supabase.from('vms_vehicle_logs').select('*').eq('plate', plate).order('created_at', { ascending: false });
        globalLedgerData = data || [];
        renderMyLedger();
      } catch (err) { document.getElementById('myLedgerBody').innerHTML = `<tr><td colspan="3" class="text-danger py-3">Error fetching logs</td></tr>`; }
    }

    function renderMyLedger() {
       let fMonth = document.getElementById('filterMonth').value;
       let fYear = document.getElementById('filterYear').value;
       let fAct = document.getElementById('filterActLog').value;

       let filtered = globalLedgerData.filter(d => {
          // Parse date DD/MM/YYYY
          let parts = d.date_str.split('/');
          let dObj = parts.length === 3 ? new Date(`${parts[2]}-${parts[1]}-${parts[0]}`) : new Date(d.date_str);
          
          let matchM = fMonth === "" || (!isNaN(dObj) && (dObj.getMonth() + 1).toString() === fMonth);
          let matchY = fYear === "" || (!isNaN(dObj) && dObj.getFullYear().toString() === fYear);
          let matchA = fAct === "" || d.activity.includes(fAct);
          return matchM && matchY && matchA;
       });

       let html = '';
       if(filtered.length === 0) { html = '<tr><td colspan="3" class="text-muted py-3">No logs found.</td></tr>'; } 
       else {
          filtered.forEach(d => {
             let bColor = d.activity.includes('Refilling') ? 'bg-warning text-dark' : (d.activity.includes('Repair') ? 'bg-danger' : (d.activity.includes('Maintain') ? 'bg-info text-dark' : 'bg-success'));
             let litStr = d.fuel_liters > 0 ? ` <br><span class="text-success fw-bold">${d.fuel_liters} L</span>` : '';
             
             let partsHtml = d.parts ? `<div class="small text-primary mt-1"><i class="bi bi-tools"></i> ${d.parts}</div>` : '';
             
             let vHtml = '';
             if(d.vouchers) {
                let vArr = d.vouchers.split(',');
                vArr.forEach((v, idx) => {
                   vHtml += `<a href="javascript:void(0)" onclick="zoomImg('${v}')" class="badge bg-secondary voucher-link"><i class="bi bi-receipt"></i> V-${idx+1}</a>`;
                });
                vHtml = `<div class="mt-1">${vHtml}</div>`;
             }

             html += `<tr>
                <td class="small text-nowrap">${d.date_str}<br><span class="fw-bold">${d.driver}</span></td>
                <td class="small text-start"><span class="badge ${bColor}">${d.activity}</span>${partsHtml}<div class="text-muted mt-1" style="font-size:0.75rem;">${d.remark || ''}</div>${vHtml}</td>
                <td class="small text-end"><span class="fw-bold">${d.odometer} KM</span><br><span class="text-danger">${d.cost > 0 ? d.cost.toLocaleString() + ' Ks' : '-'}</span>${litStr}</td>
             </tr>`;
          });
       }
       document.getElementById('myLedgerBody').innerHTML = html;
    }
  </script>
</body>
</html>
